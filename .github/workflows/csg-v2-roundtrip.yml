name: CSG v2 roundtrip

on:
  push:
    paths:
      - 'bootstrap/cheng_cold.c'
      - 'bootstrap/cold_csg_v2_format.h'
      - 'bootstrap/elf64_direct.h'
      - 'bootstrap/coff_direct.h'
      - 'bootstrap/macho_direct.h'
      - 'bootstrap/x64_emit.h'
      - 'bootstrap/rv64_emit.h'
      - 'src/core/backend/primary_object_plan.cheng'
      - 'src/core/tooling/backend_driver_dispatch_min.cheng'
      - 'src/core/tooling/compiler_csg.cheng'
      - 'tools/cold_csg_v2_roundtrip_test.sh'
      - '.github/workflows/csg-v2-roundtrip.yml'
  pull_request:

jobs:
  roundtrip:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build cold compiler
        run: |
          cc -std=c11 -Wall -Wextra -pedantic -O2 -o /tmp/cheng_cold bootstrap/cheng_cold.c

      - name: Build backend driver
        run: |
          /tmp/cheng_cold self-check --in:bootstrap/stage1_bootstrap.cheng
          /tmp/cheng_cold build-backend-driver --require-rebuild

      - name: CSG v2 roundtrip test
        run: |
          bash tools/cold_csg_v2_roundtrip_test.sh


      - name: CSG exe: cold_subset_coverage
        run: |
          /tmp/cheng_cold emit-cold-csg-v2             --root:${{ github.workspace }}             --in:src/tests/cold_subset_coverage.cheng             --out:/tmp/subset.facts             --target:arm64-apple-darwin
          COLD_NO_SIGN=1 /tmp/cheng_cold system-link-exec             --root:${{ github.workspace }}             --csg-in:/tmp/subset.facts             --emit:exe --target:arm64-apple-darwin             --out:/tmp/subset_exe
          codesign -s - /tmp/subset_exe
          /tmp/subset_exe
          echo "cold_subset_coverage exit: $?"

      - name: CSG exe: compiler_runtime_smoke
        run: |
          COLD_NO_SIGN=1 /tmp/cheng_cold system-link-exec             --root:${{ github.workspace }}             --csg-in:/tmp/compiler.facts             --emit:exe --target:arm64-apple-darwin             --out:/tmp/compiler_exe
          codesign -s - /tmp/compiler_exe
          /tmp/compiler_exe
          echo "compiler_runtime exit: $?"

      - name: Cross-compile ELF64 (RISC-V + x86_64 + AArch64)
        run: |
          /tmp/cheng_cold emit-cold-csg-v2 \
            --root:${{ github.workspace }} \
            --in:src/tests/ordinary_zero_exit_fixture.cheng \
            --out:/tmp/cross.facts \
            --target:arm64-apple-darwin
          /tmp/cheng_cold system-link-exec \
            --root:${{ github.workspace }} \
            --csg-in:/tmp/cross.facts \
            --emit:exe --target:riscv64-unknown-linux-gnu \
            --out:/tmp/rv_test
          /tmp/cheng_cold system-link-exec \
            --root:${{ github.workspace }} \
            --csg-in:/tmp/cross.facts \
            --emit:exe --target:x86_64-unknown-linux-gnu \
            --out:/tmp/x64_test
          /tmp/cheng_cold system-link-exec \
            --csg-in:/tmp/cross.facts \
            --emit:exe --target:aarch64-unknown-linux-gnu \
            --out:/tmp/aa64_test
          file /tmp/rv_test /tmp/x64_test /tmp/aa64_test
          echo "RISC-V ELF: $(file /tmp/rv_test)"
          echo "x86_64 ELF: $(file /tmp/x64_test)"
          echo "AArch64 ELF: $(file /tmp/aa64_test)"
          /tmp/cheng_cold system-link-exec \
            --csg-in:/tmp/cross.facts \
            --emit:obj --target:x86_64-pc-windows-msvc \
            --out:/tmp/coff_test.o
          file /tmp/coff_test.o
          python3 -c "
import struct; data = open('/tmp/coff_test.o','rb').read()
machine = struct.unpack_from('<H', data, 0)[0]
print(f'COFF machine=0x{machine:04X} (expected 0x8664=AMD64)')
assert machine == 0x8664, f'Bad machine: {machine}'
section_count = struct.unpack_from('<H', data, 4)[0]
print(f'Section count: {section_count}')
assert section_count > 0, 'No section headers'
sym_offset = struct.unpack_from('<I', data, 8)[0]
sym_count = struct.unpack_from('<I', data, 12)[0]
print(f'Symbol table at offset {sym_offset}, {sym_count} entries')
assert sym_count > 0, 'No symbol table'
str_table_size = struct.unpack_from('<I', data, sym_offset + sym_count * 18)[0]
print(f'String table size: {str_table_size}')
assert str_table_size >= 4, 'Invalid string table'
print('COFF structure: machine=OK sections=OK symbols=OK')
"

  linux-qemu:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU user-mode
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-user

      - name: Build cold compiler
        run: |
          cc -std=c11 -Wall -Wextra -pedantic -O2 -o /tmp/cheng_cold bootstrap/cheng_cold.c

      - name: Generate facts + cross-compile ELF exes
        run: |
          /tmp/cheng_cold emit-cold-csg-v2 \
            --root:${{ github.workspace }} \
            --in:src/tests/ordinary_zero_exit_fixture.cheng \
            --out:/tmp/cross.facts \
            --target:arm64-apple-darwin
          /tmp/cheng_cold system-link-exec \
            --csg-in:/tmp/cross.facts \
            --emit:exe --target:riscv64-unknown-linux-gnu \
            --out:/tmp/rv_test
          /tmp/cheng_cold system-link-exec \
            --csg-in:/tmp/cross.facts \
            --emit:exe --target:x86_64-unknown-linux-gnu \
            --out:/tmp/x64_test

      - name: Run RISC-V ELF with QEMU
        run: |
          qemu-riscv64 /tmp/rv_test || { echo "RISC-V QEMU FAIL"; exit 1; }
          echo "RISC-V QEMU exit 0 OK"

      - name: Run x86_64 ELF with QEMU
        run: |
          qemu-x86_64 /tmp/x64_test || { echo "x86_64 QEMU FAIL"; exit 1; }
          echo "x86_64 QEMU exit 0 OK"

      - name: Cross-compile + run AArch64 ELF with QEMU
        run: |
          /tmp/cheng_cold emit-cold-csg-v2 \
            --root:${{ github.workspace }} \
            --in:src/tests/ordinary_zero_exit_fixture.cheng \
            --out:/tmp/aa64.facts \
            --target:arm64-apple-darwin
          /tmp/cheng_cold system-link-exec \
            --csg-in:/tmp/aa64.facts \
            --emit:exe --target:aarch64-unknown-linux-gnu \
            --out:/tmp/aa64_test
          qemu-aarch64 /tmp/aa64_test || { echo "AArch64 QEMU FAIL"; exit 1; }
          echo "AArch64 QEMU exit 0 OK"

      - name: Built-in linker: atomic_i32 → RISC-V linked → QEMU
        run: |
          /tmp/cheng_cold emit-cold-csg-v2 \
            --root:${{ github.workspace }} \
            --in:src/tests/atomic_i32_runtime_smoke.cheng \
            --out:/tmp/atomic.facts \
            --target:arm64-apple-darwin
          /tmp/cheng_cold system-link-exec \
            --csg-in:/tmp/atomic.facts \
            --emit:obj --target:riscv64-unknown-linux-gnu \
            --out:/tmp/atomic_rv.o
          test -f /tmp/atomic_rv.o.linked || { echo "No linked output"; exit 1; }
          file /tmp/atomic_rv.o.linked
          qemu-riscv64 /tmp/atomic_rv.o.linked || { echo "RISC-V linked QEMU FAIL"; exit 1; }
          echo "atomic_i32 RISC-V linked exit 0 OK"

      - name: CSG + cc link-providers (ELF dotted symbols)
        run: |
          /tmp/cheng_cold system-link-exec \
            --root:${{ github.workspace }} \
            --csg-in:/tmp/atomic.facts \
            --emit:exe --target:x86_64-unknown-linux-gnu \
            --out:/tmp/csg_linked \
            --link-providers
          /tmp/csg_linked
          echo "CSG + cc link exit: $?"

      - name: Built-in linker: thread_atomic_orc → RISC-V linked → QEMU
        run: |
          /tmp/cheng_cold emit-cold-csg-v2 \
            --root:${{ github.workspace }} \
            --in:src/tests/thread_atomic_orc_runtime_smoke.cheng \
            --out:/tmp/thread.facts \
            --target:arm64-apple-darwin
          /tmp/cheng_cold system-link-exec \
            --csg-in:/tmp/thread.facts \
            --emit:obj --target:riscv64-unknown-linux-gnu \
            --out:/tmp/thread_rv.o
          test -f /tmp/thread_rv.o.linked || { echo "No linked output"; exit 1; }
          qemu-riscv64 /tmp/thread_rv.o.linked
          echo "thread RISC-V linked exit: $? (expected 11 = single-thread skip)"

      - name: Built-in linker: compiler_runtime → RISC-V linked → QEMU
        run: |
          /tmp/cheng_cold emit-cold-csg-v2 \
            --root:${{ github.workspace }} \
            --in:src/tests/compiler_runtime_smoke.cheng \
            --out:/tmp/compiler.facts \
            --target:arm64-apple-darwin
          /tmp/cheng_cold system-link-exec \
            --csg-in:/tmp/compiler.facts \
            --emit:obj --target:riscv64-unknown-linux-gnu \
            --out:/tmp/compiler_rv.o
          test -f /tmp/compiler_rv.o.linked || { echo "No linked output"; exit 1; }
          qemu-riscv64 /tmp/compiler_rv.o.linked
          echo "compiler_runtime RISC-V linked exit: $? (expected 1 = ordinary state)"
